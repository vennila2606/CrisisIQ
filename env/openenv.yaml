name: CrisisIQ
version: "1.0"
description: "A crisis intelligence environment where AI agents verify and act on crisis-related information responsibly under time pressure."

api:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state

observation_space:
  type: object
  properties:
    headline:
      type: string
    source:
      type: string
    confidence_score:
      type: number
    location:
      type: string
    time_since_post:
      type: string
    related_reports:
      type: integer
    verified_sources:
      type: integer
    severity_level:
      type: string

action_space:
  type: string
  enum:
    - VERIFY
    - ESCALATE_ALERT
    - IGNORE
    - REQUEST_MORE_INFO

tasks:
  - id: task_easy
    name: Clearly Fake News
    difficulty: easy
    description: "Identify and ignore a low-credibility fake crisis report."
  - id: task_medium
    name: Uncertain Report
    difficulty: medium
    description: "Handle an ambiguous report requiring verification."
  - id: task_hard
    name: High-Risk Real Crisis
    difficulty: hard
    description: "Rapidly escalate a genuine high-severity multi-source crisis alert."
