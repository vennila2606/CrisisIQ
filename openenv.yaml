name: Crisis Intelligence Environment
version: "1.0"
entrypoint: inference.py
port: 7860

actions:
  - VERIFY
  - ESCALATE_ALERT
  - IGNORE
  - REQUEST_MORE_INFO

observation_space:
  headline: string
  source: string
  confidence_score: float
  location: string
  time_since_post: string
  related_reports: int
  verified_sources: int
  severity_level: string

tasks:
  - id: task_001
    grader: evaluation.grader.grade
  - id: task_002
    grader: evaluation.grader.grade
  - id: task_003
    grader: evaluation.grader.grade
  - id: task_004
    grader: evaluation.grader.grade
  - id: task_005
    grader: evaluation.grader.grade

reward:
  min: 0.001
  max: 0.999